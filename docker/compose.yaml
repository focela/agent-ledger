name: agent-ledger

services:
  agent-ledger:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    # Bind to localhost; use Nginx HTTPS or SSH for remote access.
    # Public access needs "3111:3111", AGENT_LEDGER_SECRET, and a firewall.
    ports:
      - "127.0.0.1:3111:3111"
      - "127.0.0.1:3113:13113"
    volumes:
      # Named volumes are reset when Docker Desktop rebuilds its Linux VM.
      - ${AGENT_LEDGER_DATA_DIR:-../data}:/data
    # Optional runtime env (API keys, CORS). Create docker/.env.server to set
    # values; required: false needs Docker Compose 2.24+.
    env_file:
      - path: .env.server
        required: false
    environment:
      AGENT_LEDGER_DATA_DIR: /data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:3111/agent-ledger/livez || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Viewer listens on 127.0.0.1:3113 inside container (loopback only).
  viewer-proxy:
    image: alpine/socat:1.8.0.3
    network_mode: "service:agent-ledger"
    depends_on:
      agent-ledger:
        condition: service_healthy
    restart: unless-stopped
    command: ["TCP-LISTEN:13113,fork,reuseaddr,bind=0.0.0.0", "TCP:127.0.0.1:3113"]
    healthcheck:
      test: ["CMD-SHELL", "socat /dev/null TCP:127.0.0.1:13113 || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
